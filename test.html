<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Chatbot</title>
</head>
<body style="font-family:Arial;padding:40px;background:#f5f5f5;">

  <h1>Test du chatbot 🤖</h1>
  <p>Le bouton violet apparaît en bas à droite.</p>
  <p>Teste en Darija, Français ou Anglais !</p>

  <script>
  (function(){
    var API = "http://localhost:8000";
    var historique = [];

    var style = document.createElement("style");
    style.textContent = `
      #chat-btn {
        position:fixed; bottom:24px; right:24px;
        width:56px; height:56px; border-radius:50%;
        background:#534AB7; cursor:pointer; z-index:9999;
        display:flex; align-items:center; justify-content:center;
        font-size:26px; border:none;
      }
      #chat-box {
        display:none; flex-direction:column;
        position:fixed; bottom:90px; right:24px;
        width:320px; background:white; border-radius:16px;
        border:1px solid #e5e3f5; z-index:9999;
        font-family:Arial; overflow:hidden;
      }
      #chat-box.ouvert { display:flex; }
      #chat-entete {
        background:#534AB7; color:white; padding:14px 16px;
      }
      #chat-entete .nom { font-weight:bold; font-size:14px; }
      #chat-entete .statut { font-size:11px; opacity:.8; }
      #chat-messages {
        height:280px; overflow-y:auto;
        padding:14px; display:flex;
        flex-direction:column; gap:10px;
      }
      .bulle {
        max-width:85%; padding:9px 13px;
        border-radius:14px; font-size:13px;
      }
      .bulle.client {
        align-self:flex-end; background:#534AB7; color:white;
      }
      .bulle.bot {
        align-self:flex-start; background:#f0effe; color:#26215C;
      }
      #chat-saisie {
        display:flex; gap:8px;
        padding:10px; border-top:1px solid #eee;
      }
      #chat-input {
        flex:1; border:1px solid #ddd; border-radius:20px;
        padding:8px 14px; font-size:13px; outline:none;
      }
      #chat-envoyer {
        width:36px; height:36px; border-radius:50%;
        background:#534AB7; border:none; cursor:pointer;
        color:white; font-size:18px;
      }
    `;
    document.head.appendChild(style);

    var btn = document.createElement("button");
    btn.id = "chat-btn";
    btn.textContent = "💬";

    var box = document.createElement("div");
    box.id = "chat-box";
    box.innerHTML =
      '<div id="chat-entete">' +
        '<div class="nom">Assistant Ahle Addiafa</div>' +
        '<div class="statut">En ligne · Darija · Français · English</div>' +
      '</div>' +
      '<div id="chat-messages">' +
        '<div class="bulle bot">Salam! Bienvenue 👋 Comment puis-je vous aider?</div>' +
      '</div>' +
      '<div id="chat-saisie">' +
        '<input id="chat-input" placeholder="Votre message..."/>' +
        '<button id="chat-envoyer">↑</button>' +
      '</div>';

    document.body.appendChild(btn);
    document.body.appendChild(box);

    btn.addEventListener("click", function(){
      box.classList.toggle("ouvert");
    });

    function ajouterBulle(texte, type){
      var msgs = document.getElementById("chat-messages");
      var d = document.createElement("div");
      d.className = "bulle " + type;
      d.textContent = texte;
      msgs.appendChild(d);
      msgs.scrollTop = msgs.scrollHeight;
      return d;
    }

    async function envoyer(){
      var input = document.getElementById("chat-input");
      var texte = input.value.trim();
      if(!texte) return;
      input.value = "";
      ajouterBulle(texte, "client");
      var chargement = ajouterBulle("...", "bot");
      var res = await fetch(API + "/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message:texte, history:historique})
      });
      var data = await res.json();
      chargement.textContent = data.reply;
      historique.push({role:"user", content:texte});
      historique.push({role:"assistant", content:data.reply});
    }

    document.getElementById("chat-envoyer")
      .addEventListener("click", envoyer);
    document.getElementById("chat-input")
      .addEventListener("keydown", function(e){
        if(e.key === "Enter") envoyer();
      });
  })();
  </script>

</body>
</html>
